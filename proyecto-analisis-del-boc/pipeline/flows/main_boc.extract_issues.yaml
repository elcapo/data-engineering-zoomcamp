id: extract_issues
namespace: boc
description: |
  Extract a single boletín index into PostgreSQL, preferring the HTML source
  and falling back to the PDF source when no HTML is available.

  This flow tries **extract_issues_from_html** first; if it fails (typically
  because the HTML file does not exist in `boc-raw` for PDF-only issues), it
  transparently falls back to **extract_issues_from_pdf**.

  Inputs:
    - **year**: the year of the boletín.
    - **issue**: the issue number within that year.

  Steps:
    1. **try_html**: invokes **extract_issues_from_html** with the given inputs.
       The Subflow task is configured with `transmitFailed: false` so a failure
       does not propagate, only the subflow `state` is observed.
    2. **if_html_failed**: when the HTML subflow ended in `FAILED`, invokes
       **extract_issues_from_pdf** with the same year + issue.

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year

  - id: issue
    type: INT
    required: true
    displayName: Issue

variables:
  issue_padded: "{{ inputs.issue < 10 ? '00' ~ inputs.issue : inputs.issue < 100 ? '0' ~ inputs.issue : inputs.issue }}"

tasks:
  - id: log
    type: io.kestra.plugin.core.log.Log
    message: "Extract issues running for year: {{ inputs.year }} and issue: {{ inputs.issue }}"

  - id: label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      year: "{{ inputs.year }}"
      issue: "{{ render(vars.issue_padded) }}"

  - id: try_html
    type: io.kestra.plugin.core.flow.Subflow
    namespace: boc
    flowId: extract_issues_from_html
    inputs:
      year: "{{ inputs.year }}"
      issue: "{{ inputs.issue }}"
    wait: true
    transmitFailed: false

  - id: if_html_failed
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.try_html.state == 'FAILED' }}"
    then:
      - id: call_pdf
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: extract_issues_from_pdf
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ inputs.issue }}"
        wait: true
        transmitFailed: true
