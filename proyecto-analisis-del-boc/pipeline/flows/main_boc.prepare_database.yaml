id: prepare_database
namespace: boc
description: |
  Create tracking tables and metric views in PostgreSQL.

  Run this flow once before starting any downloads or extractions, and again whenever the schema changes. All statements are idempotent so it is safe to re-run at any time.

  Steps:
    1. **create_tables**: creates the **download_log** and **extraction_log** tables.
    2. **create_views**: creates or replaces the completeness views.

  The download views that depend on dlt tables are skipped with a warning if those tables do not yet exist.

tasks:
  - id: create_tables
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    pythonVersion: "python: 3.11"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
    script: |
      import os
      from pathlib import Path
      import psycopg2

      conn = psycopg2.connect(
          host=os.environ["POSTGRES_HOST"],
          dbname=os.environ["POSTGRES_DB"],
          user=os.environ["POSTGRES_USER"],
          password=os.environ["POSTGRES_PASSWORD"],
      )
      conn.autocommit = True

      sql_dir = Path("/app/sql/prepare")

      files = [
          "schema_boc_dataset.sql",
          "schema_boc_log.sql",
          "table_download_log.sql",
          "table_extraction_log.sql",
          "table_sections.sql",
          "table_organizations.sql",
      ]

      with conn.cursor() as cur:
          for f in files:
              cur.execute((sql_dir / f).read_text())

      conn.close()

  - id: create_views
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    pythonVersion: "python: 3.11"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
    script: |
      import os
      from pathlib import Path
      import psycopg2

      conn = psycopg2.connect(
          host=os.environ["POSTGRES_HOST"],
          dbname=os.environ["POSTGRES_DB"],
          user=os.environ["POSTGRES_USER"],
          password=os.environ["POSTGRES_PASSWORD"],
      )
      conn.autocommit = True

      sql_dir = Path("/app/sql/prepare")

      view_files = [
          "view_metric_download_years.sql",
          "view_metric_download_issues.sql",
          "view_metric_download_documents.sql",
          "view_metric_extraction_years.sql",
          "view_metric_extraction_issues.sql",
          "view_metric_extraction_documents.sql",
          "view_followup_issues.sql",
          "view_followup_documents.sql",
      ]

      for f in view_files:
          try:
              with conn.cursor() as cur:
                  cur.execute((sql_dir / f).read_text())
          except psycopg2.errors.UndefinedTable:
              # Base table not yet created by dlt (no data loaded yet).
              # The view will be created the next time this flow runs after
              # the first extraction has populated the missing table.
              conn.rollback()

      conn.close()
