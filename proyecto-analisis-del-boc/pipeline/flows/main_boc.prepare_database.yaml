id: prepare_database
namespace: boc
description: |
  Create the tracking table and metric views in PostgreSQL.

  Run this flow once before starting any downloads.
  All statements are idempotent so it is safe to re-run at any time.

  Steps:
    1. create_tables  – ensures boc_dataset schema and download_log table exist.
    2. create_views   – creates or replaces the three download-completeness views.
                        If a base table (archive, year, issue…) does not exist yet
                        because no data has been loaded, the view is skipped with a
                        warning instead of failing the whole flow.

tasks:
  - id: create_tables
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
    script: |
      import os
      import psycopg2

      conn = psycopg2.connect(
          host=os.environ["POSTGRES_HOST"],
          dbname=os.environ["POSTGRES_DB"],
          user=os.environ["POSTGRES_USER"],
          password=os.environ["POSTGRES_PASSWORD"],
      )
      conn.autocommit = True

      with conn.cursor() as cur:
          cur.execute("CREATE SCHEMA IF NOT EXISTS boc_dataset")

          cur.execute("""
              CREATE TABLE IF NOT EXISTS boc_dataset.download_log (
                  object_key      TEXT        NOT NULL,
                  entity_type     TEXT        NOT NULL,
                  year            INTEGER,
                  issue           INTEGER,
                  disposition     INTEGER,
                  downloaded_at   TIMESTAMPTZ NOT NULL DEFAULT now(),
                  file_size_bytes BIGINT,
                  CONSTRAINT download_log_pkey PRIMARY KEY (object_key)
              )
          """)

          cur.execute("""
              CREATE INDEX IF NOT EXISTS download_log_year_idx
                  ON boc_dataset.download_log (entity_type, year)
          """)

          cur.execute("""
              CREATE INDEX IF NOT EXISTS download_log_issue_idx
                  ON boc_dataset.download_log (entity_type, year, issue)
          """)

      conn.close()
      print("Tables ready.")

  - id: create_views
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
    script: |
      import os
      import psycopg2

      conn = psycopg2.connect(
          host=os.environ["POSTGRES_HOST"],
          dbname=os.environ["POSTGRES_DB"],
          user=os.environ["POSTGRES_USER"],
          password=os.environ["POSTGRES_PASSWORD"],
      )
      conn.autocommit = True

      views = {
          # ------------------------------------------------------------------
          # metric_years
          # For each year listed in the archive, did we download its index?
          # ------------------------------------------------------------------
          "metric_years": """
              CREATE OR REPLACE VIEW boc_dataset.metric_years AS
              SELECT
                  COUNT(*)                                                  AS total_years,
                  COUNT(dl.year)                                            AS downloaded_years,
                  ROUND(
                      100.0 * COUNT(dl.year) / NULLIF(COUNT(*), 0), 1
                  )                                                         AS percentage
              FROM boc_dataset.archive a
              LEFT JOIN boc_dataset.download_log dl
                  ON dl.entity_type = 'year'
                 AND dl.year        = a.year::INT
          """,

          # ------------------------------------------------------------------
          # metric_issues
          # For each issue listed in a year index, did we download its index?
          # One row per year.
          # ------------------------------------------------------------------
          "metric_issues": """
              CREATE OR REPLACE VIEW boc_dataset.metric_issues AS
              SELECT
                  y.year,
                  COUNT(*)                                                  AS total_issues,
                  COUNT(dl.issue)                                           AS downloaded_issues,
                  ROUND(
                      100.0 * COUNT(dl.issue) / NULLIF(COUNT(*), 0), 1
                  )                                                         AS percentage
              FROM boc_dataset.year y
              LEFT JOIN boc_dataset.download_log dl
                  ON dl.entity_type = 'issue'
                 AND dl.year        = y.year
                 AND dl.issue       = y.issue
              GROUP BY y.year
              ORDER BY y.year
          """,

          # ------------------------------------------------------------------
          # metric_documents
          # For each disposition listed in an issue index, did we download
          # its HTML?  Disposition number is extracted from the `html` URL
          # stored in issue__dispositions (e.g. "/boc/2024/001/003.html").
          # One row per (year, issue).
          # ------------------------------------------------------------------
          "metric_documents": """
              CREATE OR REPLACE VIEW boc_dataset.metric_documents AS
              SELECT
                  i.year,
                  i.issue,
                  COUNT(*)                                                  AS total_documents,
                  COUNT(dl.disposition)                                     AS downloaded_documents,
                  ROUND(
                      100.0 * COUNT(dl.disposition) / NULLIF(COUNT(*), 0), 1
                  )                                                         AS percentage
              FROM boc_dataset.issue i
              JOIN boc_dataset.issue__dispositions id
                  ON id._dlt_parent_id = i._dlt_id
              LEFT JOIN boc_dataset.download_log dl
                  ON dl.entity_type  = 'document'
                 AND dl.year         = i.year
                 AND dl.issue        = i.issue
                 AND dl.disposition  = (regexp_match(id.html, '/(\d+)\.html$'))[1]::INT
              GROUP BY i.year, i.issue
              ORDER BY i.year, i.issue
          """,
      }

      for name, sql in views.items():
          try:
              with conn.cursor() as cur:
                  cur.execute(sql)
              print(f"View {name}: OK")
          except psycopg2.errors.UndefinedTable as e:
              # Base table not yet created by dlt (no data loaded yet).
              # The view will be created the next time this flow runs after
              # the first extraction has populated the missing table.
              print(f"View {name}: SKIPPED – {e.pgerror.strip()}")
              conn.rollback()

      conn.close()
