id: backfill_issues
namespace: boc
description: Backfill for bulletin dispositions

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year
    defaults: "{{ now() | date('yyyy') }}"

  - id: from_bulletin
    type: INT
    required: true
    displayName: From bulletin
    defaults: "1"

  - id: to_bulletin
    type: INT
    required: true
    displayName: To bulletin
    defaults: "1"

tasks:
  - id: iterate_bulletins
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ range(inputs.from_bulletin, inputs.to_bulletin) }}"
    tasks:
      - id: call_download_issues
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_issues
        inputs:
          year: "{{ inputs.year }}"
          bulletin: "{{ taskrun.value }}"
