id: backfill_issues
namespace: boc
description: Backfill for issue dispositions

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year
    defaults: "{{ now() | date('yyyy') }}"

  - id: from_issue
    type: INT
    required: true
    displayName: From issue
    defaults: "1"

  - id: to_issue
    type: INT
    required: true
    displayName: To issue
    defaults: "1"

tasks:
  - id: iterate_issues
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ range(inputs.from_issue, inputs.to_issue) }}"
    tasks:
      - id: call_download_issues
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_issues
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ taskrun.value }}"
