id: backfill_issues
namespace: boc
description: |
  Trigger **download_issues** sequentially for a range of boletines within a given year.

  Iterates from **from_issue** up to (but not including) **to_issue** and invokes **download_issues** for each boletín number. Both **overwrite** and **extract** are hardcoded to `true`, so existing files are always re-downloaded and each boletín is extracted immediately after download.

  Inputs:
    - **year**: the year whose boletines should be processed. Defaults to the current year.
    - **from_issue**: first boletín number to process (inclusive). Defaults to 1.
    - **to_issue**: last boletín number to process (exclusive). Defaults to 1.

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year
    defaults: "{{ now() | date('yyyy') }}"

  - id: from_issue
    type: INT
    required: true
    displayName: From issue
    defaults: "1"

  - id: to_issue
    type: INT
    required: true
    displayName: To issue
    defaults: "1"

tasks:
  - id: iterate_issues
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ range(inputs.from_issue, inputs.to_issue) }}"
    tasks:
      - id: call_download_issues
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_issues
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ taskrun.value }}"
          overwrite: true
          extract: true