id: patch_issue_2001_121
namespace: boc
description: |
  Patch flow for BOC 2001/121 — published only as PDF, no HTML index available.

  Hardcodes the issue data extracted manually from the scanned PDF and loads it
  into PostgreSQL via dlt, exactly as extract_issues would.

  Tables affected:
  - **boc_dataset.issue** (merge on year + issue)
  - **boc_dataset.issue__dispositions** (child table)
  - **boc_log.extraction_log** (upsert)

tasks:
  - id: log
    type: io.kestra.plugin.core.log.Log
    message: "Patch: loading BOC 2001/121 (PDF-only issue)"

  - id: label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      year: "2001"
      issue: "121"

  - id: load
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    pythonVersion: "python: 3.11"
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
    script: |
      import json
      import dlt
      import os

      host = os.environ["POSTGRES_HOST"]
      db   = os.environ["POSTGRES_DB"]
      user = os.environ["POSTGRES_USER"]
      pwd  = os.environ["POSTGRES_PASSWORD"]

      records = {
          "year": 2001,
