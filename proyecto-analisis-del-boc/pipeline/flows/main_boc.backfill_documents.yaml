id: backfill_documents
namespace: boc
description: |
  Trigger **download_documents** sequentially for a range of dispositions within a single boletín.

  Iterates from **from_document** up to **to_document** and invokes **download_documents** for each disposition number. Because **download_documents** has **extract** enabled by default, each downloaded disposition is also extracted (converted to Markdown and loaded into PostgreSQL) unless the subflow default is changed.

  Inputs:
    - **year**: the year of the boletín. Defaults to the current year.
    - **issue**: the boletín number within that year. Defaults to 1.
    - **from_document**: first disposition number to process. Defaults to 1.
    - **to_document**: last disposition number to process. Defaults to 1.

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year
    defaults: "{{ now() | date('yyyy') }}"

  - id: issue
    type: INT
    required: true
    displayName: Issue
    defaults: "1"

  - id: from_document
    type: INT
    required: true
    displayName: From document
    defaults: "1"

  - id: to_document
    type: INT
    required: true
    displayName: To document
    defaults: "1"

tasks:
  - id: iterate_documents
    type: io.kestra.plugin.core.flow.ForEach
    values: "{{ range(inputs.from_document, inputs.to_document) | reverse }}"
    tasks:
      - id: call_download_documents
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_documents
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ inputs.issue }}"
          disposition: "{{ taskrun.value }}"
