id: backfill_download_log
namespace: boc
description: |
  Populate download_log for files already present in MinIO before the log_download step was added to the download flows.

  Uses the MinIO Python SDK to iterate over objects in a streaming fashion (one page at a time), so memory usage is bounded regardless of bucket size. Inserts are batched for efficiency.

  Safe to re-run.

tasks:
  - id: insert
    type: io.kestra.plugin.scripts.python.Script
    containerImage: boc-python:latest
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      networkMode: boc-postgres-network
    env:
      POSTGRES_HOST: "{{ envs.postgres_data_host }}"
      POSTGRES_DB: "{{ envs.postgres_data_db }}"
      POSTGRES_USER: "{{ envs.postgres_data_user }}"
      POSTGRES_PASSWORD: "{{ envs.postgres_data_password }}"
      MINIO_ENDPOINT: "{{ envs.minio_endpoint }}"
      MINIO_USER: "{{ envs.minio_user }}"
      MINIO_PASSWORD: "{{ envs.minio_password }}"
      MINIO_RAW_BUCKET: "{{ envs.minio_raw_bucket }}"
    script: |
      import os
      import re
      import psycopg2
      from minio import Minio

      PATTERNS = [
          (
              re.compile(r"^archive/archive\.html\.gz$"),
              lambda m: ("archive", None, None, None),
          ),
          (
              re.compile(r"^years/(\d{4})\.html\.gz$"),
              lambda m: ("year", int(m.group(1)), None, None),
          ),
          (
              re.compile(r"^issues/(\d{4})-(\d{3})\.html\.gz$"),
              lambda m: ("issue", int(m.group(1)), int(m.group(2)), None),
          ),
          (
              re.compile(r"^documents/(\d{4})/(\d{3})/(\d{3})\.html\.gz$"),
              lambda m: ("document", int(m.group(1)), int(m.group(2)), int(m.group(3))),
          ),
      ]

      BATCH_SIZE = 500

      raw_endpoint = os.environ["MINIO_ENDPOINT"]
      endpoint = raw_endpoint.removeprefix("http://").removeprefix("https://")
      secure = raw_endpoint.startswith("https://")

      minio = Minio(
          endpoint,
          access_key=os.environ["MINIO_USER"],
          secret_key=os.environ["MINIO_PASSWORD"],
          secure=secure,
      )

      conn = psycopg2.connect(
          host=os.environ["POSTGRES_HOST"],
          dbname=os.environ["POSTGRES_DB"],
          user=os.environ["POSTGRES_USER"],
          password=os.environ["POSTGRES_PASSWORD"],
      )
      conn.autocommit = True

      inserted = already_present = unmatched = 0
      batch = []

      def flush(cur, batch):
          if not batch:
              return 0, 0
          cur.executemany(
              "INSERT INTO boc_log.download_log "
              "  (object_key, entity_type, year, issue, disposition) "
              "VALUES (%s, %s, %s, %s, %s) "
              "ON CONFLICT (object_key) DO NOTHING",
              batch,
          )
          ins = cur.rowcount
          return ins, len(batch) - ins

      prefixes = ["archive/", "years/", "issues/", "documents/"]

      with conn.cursor() as cur:
          for prefix in prefixes:
              for obj in minio.list_objects(os.environ["MINIO_RAW_BUCKET"], prefix=prefix, recursive=True):
                  key = obj.object_name
                  for pattern, extractor in PATTERNS:
                      m = pattern.match(key)
                      if m:
                          batch.append((key, *extractor(m)))
                          break
                  else:
                      print(f"WARNING: unrecognised key: {key}")
                      unmatched += 1

                  if len(batch) >= BATCH_SIZE:
                      ins, dup = flush(cur, batch)
                      inserted += ins
                      already_present += dup
                      batch.clear()

          ins, dup = flush(cur, batch)
          inserted += ins
          already_present += dup

      conn.close()
      print(f"Inserted: {inserted}, already present: {already_present}, unmatched: {unmatched}")
