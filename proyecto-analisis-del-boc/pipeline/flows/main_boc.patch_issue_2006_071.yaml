    type: io.kestra.plugin.core.log.Log
    message: "Patch: loading BOC 2006/071 (PDF-only issue)"

  - id: label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      year: "2006"
      issue: "071"

  - id: load
