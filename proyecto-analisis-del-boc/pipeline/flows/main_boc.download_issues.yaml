id: download_issues
namespace: boc
description: |
  Download a single boletín index, preferring the HTML version and falling
  back to the PDF version when no HTML is available.

  Most BOC issues are published with an HTML index, but a few old ones (e.g.
  2002/084, 2006/071) are PDF-only. This flow tries
  **download_issues_from_html** first; if it fails (typically because the
  HTML URL returns 404), it transparently falls back to
  **download_issues_from_pdf**.

  Both subflows internally trigger their corresponding extractor
  (**extract_issues_from_html** or **extract_issues_from_pdf**) when
  **extract** is true, so this wrapper does not need to call the extractor
  itself.

  Inputs:
    - **year**: the year of the boletín.
    - **issue**: the issue number within that year.
    - **overwrite**: re-download even if the file already exists. Defaults to false.
    - **extract**: trigger the matching extractor after a successful download. Defaults to true.

  Steps:
    1. **try_html**: invokes **download_issues_from_html** with the given inputs.
       The Subflow task is configured with `transmitFailed: false` so a failure
       does not propagate, only the subflow `state` is observed.
    2. **if_html_failed**: when the HTML subflow ended in `FAILED`, invokes
       **download_issues_from_pdf** with the same year + issue.

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year

  - id: issue
    type: INT
    required: true
    displayName: Issue

  - id: overwrite
    type: BOOL
    displayName: Overwrite
    defaults: false

  - id: extract
    type: BOOL
    displayName: Extract
    defaults: true

variables:
  issue_padded: "{{ inputs.issue < 10 ? '00' ~ inputs.issue : inputs.issue < 100 ? '0' ~ inputs.issue : inputs.issue }}"

tasks:
  - id: log
    type: io.kestra.plugin.core.log.Log
    message: "Download issues running for year: {{ inputs.year }} and issue: {{ inputs.issue }}"

  - id: label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      year: "{{ inputs.year }}"
      issue: "{{ render(vars.issue_padded) }}"

  - id: try_html
    type: io.kestra.plugin.core.flow.Subflow
    namespace: boc
    flowId: download_issues_from_html
    inputs:
      year: "{{ inputs.year }}"
      issue: "{{ inputs.issue }}"
      overwrite: "{{ inputs.overwrite }}"
      extract: "{{ inputs.extract }}"
    wait: true
    transmitFailed: false

  - id: if_html_failed
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.try_html.state == 'FAILED' }}"
    then:
      - id: call_pdf
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_issues_from_pdf
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ inputs.issue }}"
          overwrite: "{{ inputs.overwrite }}"
          extract: "{{ inputs.extract }}"
        wait: true
        transmitFailed: true
