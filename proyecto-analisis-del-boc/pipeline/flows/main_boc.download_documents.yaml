id: download_documents
namespace: boc
description: |
  Download a single BOC disposition, preferring the HTML version and falling
  back to the PDF version when no HTML is available.

  Most BOC dispositions are published in HTML and PDF, but a few are PDF-only.
  This flow tries **download_documents_from_html** first; if it fails (typically
  because the HTML URL returns 404), it transparently falls back to
  **download_documents_from_pdf**, which looks up the PDF URL of the disposition
  in **boc_dataset.issue__dispositions**.

  Both subflows internally trigger their corresponding extractor
  (**extract_documents_from_html** or **extract_documents_from_pdf**) when
  **extract** is true, so this wrapper does not need to call the extractor
  itself.

  Inputs:
    - **year**: the year of the boletín.
    - **issue**: the issue number within that year.
    - **disposition**: the disposition number within the boletín.
    - **overwrite**: re-download even if the file already exists. Defaults to false.
    - **extract**: trigger the matching extractor after a successful download. Defaults to true.

  Steps:
    1. **try_html**: invokes **download_documents_from_html** with the given inputs.
       The Subflow task is configured with `transmitFailed: false` so a failure
       does not propagate, only the subflow `state` is observed.
    2. **if_html_failed**: when the HTML subflow ended in `FAILED`, invokes
       **download_documents_from_pdf** with the same year + issue + disposition.

inputs:
  - id: year
    type: INT
    required: true
    displayName: Year

  - id: issue
    type: INT
    required: true
    displayName: Issue

  - id: disposition
    type: INT
    required: true
    displayName: Disposition

  - id: overwrite
    type: BOOL
    displayName: Overwrite
    defaults: false

  - id: extract
    type: BOOL
    displayName: Extract
    defaults: true

variables:
  issue_padded: "{{ inputs.issue < 10 ? '00' ~ inputs.issue : inputs.issue < 100 ? '0' ~ inputs.issue : inputs.issue }}"
  disposition_padded: "{{ inputs.disposition < 10 ? '00' ~ inputs.disposition : inputs.disposition < 100 ? '0' ~ inputs.disposition : inputs.disposition }}"

tasks:
  - id: log
    type: io.kestra.plugin.core.log.Log
    message: "Download documents running for year: {{ inputs.year }}, issue: {{ inputs.issue }} and disposition: {{ inputs.disposition }}"

  - id: label
    type: io.kestra.plugin.core.execution.Labels
    labels:
      year: "{{ inputs.year }}"
      issue: "{{ render(vars.issue_padded) }}"
      disposition: "{{ render(vars.disposition_padded) }}"

  - id: try_html
    type: io.kestra.plugin.core.flow.Subflow
    namespace: boc
    flowId: download_documents_from_html
    inputs:
      year: "{{ inputs.year }}"
      issue: "{{ inputs.issue }}"
      disposition: "{{ inputs.disposition }}"
      overwrite: "{{ inputs.overwrite }}"
      extract: "{{ inputs.extract }}"
    wait: true
    transmitFailed: false

  - id: if_html_failed
    type: io.kestra.plugin.core.flow.If
    condition: "{{ outputs.try_html.state == 'FAILED' }}"
    then:
      - id: call_pdf
        type: io.kestra.plugin.core.flow.Subflow
        namespace: boc
        flowId: download_documents_from_pdf
        inputs:
          year: "{{ inputs.year }}"
          issue: "{{ inputs.issue }}"
          disposition: "{{ inputs.disposition }}"
          overwrite: "{{ inputs.overwrite }}"
          extract: "{{ inputs.extract }}"
        wait: true
        transmitFailed: true
