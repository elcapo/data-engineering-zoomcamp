services:
  kestra_postgres:
    image: postgres:18
    hostname: kestra-postgres
    volumes:
      - kestra-postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: ${POSTGRES_KESTRA_USER:-kestra}
      POSTGRES_PASSWORD: ${POSTGRES_KESTRA_PASSWORD:-k3str4}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - boc-postgres-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopass}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - boc-postgres-network

  minio_client:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET:-boc-raw}
      MINIO_MARKDOWN_BUCKET: ${MINIO_MARKDOWN_BUCKET:-boc-markdown}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio} $${MINIO_ROOT_PASSWORD:-miniopass};
      mc mb --ignore-existing local/$${MINIO_RAW_BUCKET};
      mc mb --ignore-existing local/$${MINIO_MARKDOWN_BUCKET};
      exit 0;
      "
    networks:
      - boc-postgres-network

  kestra:
    image: kestra/kestra:v1.3
    pull_policy: always
    # Kestra, by default, has a termination grace period of 5m. We need to wait a little more to be sure no active tasks are running.
    stop_grace_period: 6m
    # Note that this setup with a root user is intended for development purpose.
    # Our base image runs without root, but the Docker Compose implementation needs root to access the Docker socket
    user: "root"
    security_opt:
      - apparmor:unconfined
    command: server standalone
    volumes:
      - kestra-data:/app/storage
      - ${DOCKER_SOCKET_DIR:-/var/run}/docker.sock:/var/run/docker.sock
      - /tmp/kestra-wd:/tmp/kestra-wd
      - ./flows:/flows
    environment:
      # Exposed to flows as {{ envs.postgres_data_* }}
      ENV_POSTGRES_DATA_HOST: ${POSTGRES_DATA_HOST}
      ENV_POSTGRES_DATA_DB: boc
      ENV_POSTGRES_DATA_USER: ${POSTGRES_DATA_USER:-root}
      ENV_POSTGRES_DATA_PASSWORD: ${POSTGRES_DATA_PASSWORD:-root}
      # Exposed to flows as {{ envs.minio_* }}
      ENV_MINIO_ENDPOINT: http://minio:9000
      ENV_MINIO_USER: ${MINIO_ROOT_USER:-minio}
      ENV_MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniopass}
      ENV_MINIO_RAW_BUCKET: ${MINIO_RAW_BUCKET:-boc-raw}
      ENV_MINIO_MARKDOWN_BUCKET: ${MINIO_MARKDOWN_BUCKET:-boc-markdown}
      KESTRA_CONFIGURATION: |
        micronaut:
          io:
            watch:
              enabled: true
              paths:
                - /flows
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: ${POSTGRES_KESTRA_USER:-kestra}
            password: ${POSTGRES_KESTRA_PASSWORD:-k3str4}
        kestra:
          server:
            basic-auth:
              username: ${KESTRA_USER:-admin@kestra.io}       # it must be a valid email address
              password: ${KESTRA_PASSWORD:-Admin1234!}        # it must be at least 8 characters long with uppercase letter and a number
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: "/app/storage"
          queue:
            type: postgres
          tutorial-flows:
            enabled: false
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:${KESTRA_PORT:-8080}/
          ai:
            type: "gemini"
            gemini:
              api-key: ${KESTRA_GEMINI_APIKEY:-foo}
              model-name: gemini-2.5-flash
    ports:
      - "${KESTRA_PORT:-8080}:8080"
      - "8081:8081"
    depends_on:
      kestra_postgres:
        condition: service_healthy
      minio_client:
        condition: service_completed_successfully
    networks:
      - boc-postgres-network

volumes:
  kestra-postgres-data:
  kestra-data:
  minio-data:

networks:
  boc-postgres-network:
    name: boc-postgres-network
