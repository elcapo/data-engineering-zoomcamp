services:
  boc-web:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in frontend/web/.env}
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set in frontend/web/.env}
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    networks:
      - boc-postgres-network
    restart: always

networks:
  boc-postgres-network:
    name: boc-postgres-network
    external: true
