services:

  # --- Message Broker ---

  redpanda:
    image: redpandadata/redpanda:v25.3.13
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_PORT:-9092}
    ports:
      - "${REDPANDA_PORT:-9092}:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls=redpanda:9644"]
      interval: 10s
      retries: 5
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:v3.7.0
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8080}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  redpanda-init:
    image: redpandadata/redpanda:v25.3.13
    entrypoint: ["rpk", "topic", "create", "gdelt.events", "gdelt.mentions", "gdelt.gkg", "--brokers", "redpanda:9092", "--partitions", "1", "--replicas", "1"]
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Database ---

  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdelt}"]
      interval: 10s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:9
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # --- Producer (triggered by Kestra, not auto-started) ---

  producer:
    build: ./producer
    image: gdelt-producer
    profiles: ["cli"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Orchestrator ---

  kestra:
    image: kestra/kestra:v1.3
    command: server standalone
    user: "root"
    ports:
      - "${KESTRA_PORT:-8082}:8080"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
      - kestra-data:/app/storage
      - ${DOCKER_SOCKET_DIR:-/var/run}/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/configs >/dev/null"]
      interval: 10s
      retries: 20
      start_period: 30s
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: memory
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: memory
          server:
            basic-auth:
              username: ${KESTRA_USER:-admin@kestra.io} # it must be a valid email address
              password: ${KESTRA_PASSWORD:-Admin1234!}  # it must be at least 8 characters long with uppercase letter and a number
          tutorial-flows:
            enabled: false
    depends_on:
      redpanda:
        condition: service_healthy

  kestra-flows-sync:
    image: kestra/kestra:v1.3
    entrypoint: ["/bin/sh", "-c"]
    environment:
      KESTRA_USER: ${KESTRA_USER:-admin@kestra.io}
      KESTRA_PASSWORD: ${KESTRA_PASSWORD:-Admin1234!}
    command:
      - |
        /app/kestra flow namespace update gdelt /opt/kestra/flows \
          --server http://kestra:8080 \
          --user "$${KESTRA_USER}:$${KESTRA_PASSWORD}"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
    depends_on:
      kestra:
        condition: service_healthy
    restart: "no"

  # --- Stream Processing ---

  flink-jobmanager:
    build: ./flink
    command: jobmanager
    ports:
      - "${FLINK_PORT:-8081}:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy

  flink-taskmanager:
    build: ./flink
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-4}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      - flink-jobmanager

  flink-job-submitter:
    build: ./flink
    command: /opt/flink/submit-jobs.sh
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    restart: "no"

  # --- Visualization ---

  grafana:
    image: grafana/grafana:12.4
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default:
    name: gdelt-net

volumes:
  pgdata:
  kestra-data:
  grafana-data:
  pgadmin-data:
