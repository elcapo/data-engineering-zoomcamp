services:

  # --- Message Broker ---

  redpanda:
    image: redpandadata/redpanda:v26.1.4
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_PORT:-9092}
    ports:
      - "${REDPANDA_PORT:-9092}:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls=redpanda:9644"]
      interval: 10s
      retries: 5
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:v3.7.1
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8081}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  redpanda-init:
    image: redpandadata/redpanda:v26.1.4
    entrypoint: ["rpk", "topic", "create", "gdelt.events", "gdelt.mentions", "gdelt.gkg", "--brokers", "redpanda:9092", "--partitions", "1", "--replicas", "1"]
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Database ---

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdelt}"]
      interval: 10s
      retries: 5
      start_period: 10s

  pgadmin-init:
    image: alpine:3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    volumes:
      - pgadmin-secrets:/out
    entrypoint:
      - sh
      - -c
      - |
        echo "postgres:5432:*:$$POSTGRES_USER:$$POSTGRES_PASSWORD" > /out/pgpass
        chown 5050:5050 /out/pgpass
        chmod 600 /out/pgpass
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:9.14.0
    ports:
      - "${PGADMIN_PORT:-8083}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-secrets:/pgadmin4/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      pgadmin-init:
        condition: service_completed_successfully

  # --- Producer (triggered by Kestra, not auto-started) ---

  producer:
    build: ./producer
    image: gdelt-producer
    profiles: ["cli"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Orchestrator ---

  kestra:
    image: kestra/kestra:v1.3.10
    command: server standalone
    user: "root"
    ports:
      - "${KESTRA_PORT:-8080}:8080"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
      - kestra-data:/app/storage
      - ${DOCKER_SOCKET_DIR:-/var/run}/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/configs >/dev/null"]
      interval: 10s
      retries: 20
      start_period: 30s
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: memory
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: memory
          server:
            basic-auth:
              username: ${KESTRA_USER:-admin@kestra.io} # it must be a valid email address
              password: ${KESTRA_PASSWORD:-Admin1234!}  # it must be at least 8 characters long with uppercase letter and a number
          tutorial-flows:
            enabled: false
    depends_on:
      redpanda:
        condition: service_healthy

  kestra-flows-sync:
    image: kestra/kestra:v1.3.10
    entrypoint: ["/bin/sh", "-c"]
    environment:
      KESTRA_USER: ${KESTRA_USER:-admin@kestra.io}
      KESTRA_PASSWORD: ${KESTRA_PASSWORD:-Admin1234!}
    command:
      - |
        /app/kestra flow namespace update gdelt /opt/kestra/flows \
          --server http://kestra:8080 \
          --user "$${KESTRA_USER}:$${KESTRA_PASSWORD}"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
    depends_on:
      kestra:
        condition: service_healthy
    restart: "no"

  # --- Schema / Seeds (dbt) ---

  dbt-init:
    build: ./dbt
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt}
    command: ["seed", "--full-refresh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- Stream Processing ---

  flink-jobmanager:
    build: ./flink
    command: jobmanager
    ports:
      - "${FLINK_PORT:-8082}:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dbt-init:
        condition: service_completed_successfully

  flink-taskmanager:
    build: ./flink
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-4}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      - flink-jobmanager

  flink-job-submitter:
    build: ./flink
    command: /opt/flink/submit-jobs.sh
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/gdelt
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    restart: "no"

  # --- Visualization ---

  metabase:
    image: metabase/metabase:v0.59.6.5
    ports:
      - "${METABASE_PORT:-8084}:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - metabase-data:/metabase-data
      - ./metabase/export:/metabase-export
    depends_on:
      postgres:
        condition: service_healthy

  metabase-init:
    image: alpine:3
    environment:
      METABASE_USER: ${METABASE_USER:-admin@admin.com}
      METABASE_PASSWORD: ${METABASE_PASSWORD:-MetabaseAdmin1!}
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdelt}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache curl jq >/dev/null
        echo "Waiting for Metabase..."
        until curl -sf http://metabase:3000/api/health >/dev/null 2>&1; do sleep 3; done
        PROPS=$$(curl -sf http://metabase:3000/api/session/properties)
        if [ "$$(echo "$$PROPS" | jq -r '."has-user-setup"')" != "true" ]; then
          TOKEN=$$(echo "$$PROPS" | jq -r '."setup-token"')
          echo "Creating admin user via /api/setup..."
          jq -n \
            --arg token "$$TOKEN" \
            --arg email "$$METABASE_USER" \
            --arg password "$$METABASE_PASSWORD" \
            '{
              token: $$token,
              user: {first_name: "Admin", last_name: "User", email: $$email, site_name: "GDELT", password: $$password, password_confirm: $$password},
              prefs: {site_name: "GDELT", site_locale: "en", allow_tracking: false}
            }' > /tmp/setup.json
          curl -sf -X POST http://metabase:3000/api/setup \
            -H "Content-Type: application/json" \
            -d @/tmp/setup.json >/dev/null
        else
          echo "Admin user already exists, skipping setup."
        fi
        echo "Logging in..."
        SESSION=$$(curl -sf -X POST http://metabase:3000/api/session \
          -H "Content-Type: application/json" \
          -d "{\"username\":\"$$METABASE_USER\",\"password\":\"$$METABASE_PASSWORD\"}" | jq -r .id)
        if [ -z "$$SESSION" ] || [ "$$SESSION" = "null" ]; then
          echo "Failed to log in to Metabase." >&2; exit 1
        fi
        EXISTS=$$(curl -sf -H "X-Metabase-Session: $$SESSION" http://metabase:3000/api/database \
          | jq -r '.data[] | select(.name=="GDELT Postgres") | .id')
        if [ -n "$$EXISTS" ]; then
          echo "Postgres database already registered (id=$$EXISTS)."
        else
          echo "Registering Postgres database..."
          jq -n \
            --arg pguser "$$POSTGRES_USER" \
            --arg pgpass "$$POSTGRES_PASSWORD" \
            --arg pgdb "$$POSTGRES_DB" \
            '{
              engine: "postgres",
              name: "GDELT Postgres",
              details: {host: "postgres", port: 5432, dbname: $$pgdb, user: $$pguser, password: $$pgpass, ssl: false, "tunnel-enabled": false}
            }' > /tmp/db.json
          RESP=$$(curl -s -o /tmp/db-resp.json -w "%{http_code}" -X POST http://metabase:3000/api/database \
            -H "Content-Type: application/json" \
            -H "X-Metabase-Session: $$SESSION" \
            -d @/tmp/db.json)
          if [ "$$RESP" != "200" ]; then
            echo "Failed to register database (HTTP $$RESP):" >&2
            cat /tmp/db-resp.json >&2; echo >&2
            exit 1
          fi
        fi
        SAMPLE_IDS=$$(curl -sf -H "X-Metabase-Session: $$SESSION" http://metabase:3000/api/database \
          | jq -r '.data[] | select(.is_sample == true) | .id')
        for id in $$SAMPLE_IDS; do
          echo "Deleting sample database id=$$id..."
          curl -sf -X DELETE -H "X-Metabase-Session: $$SESSION" \
            http://metabase:3000/api/database/$$id >/dev/null
        done
        echo "Metabase setup complete."
    depends_on:
      metabase:
        condition: service_started
    restart: "no"

networks:
  default:
    name: gdelt-net

volumes:
  pgdata:
  kestra-data:
  pgadmin-data:
  pgadmin-secrets:
  metabase-data:
