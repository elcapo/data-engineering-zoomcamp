apiVersion: 1

datasources:
  - name: PostgreSQL
    uid: gdelt-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: $__env{POSTGRES_USER}
    jsonData:
      database: $__env{POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    secureJsonData:
      password: $__env{POSTGRES_PASSWORD}
    isDefault: true
    editable: false
