services:
  jobmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    command: jobmanager
    ports:
      - ${FLINK_JOBMANAGER_PORT:-8081}:8081
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    build:
      context: .
      dockerfile: flink.Dockerfile
    command: taskmanager
    volumes:
      - ./src/:/opt/src
    depends_on:
      - jobmanager
    restart: on-failure
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3