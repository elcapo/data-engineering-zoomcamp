services:
  jobmanager:
    build:
      dockerfile: flink.Dockerfile
    ports:
      - ${FLINK_JOBMANAGER_PORT:-8081}:8081
    volumes:
      - ./:/opt/flink/usrlib
      - ./src/:/opt/src
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    build:
      dockerfile: flink.Dockerfile
    volumes:
      - ./src/:/opt/src
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 15
        parallelism.default: 3