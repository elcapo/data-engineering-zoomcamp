services:

  # --- Message Broker ---

  redpanda:
    image: redpandadata/redpanda:v26.1.4
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:${REDPANDA_PORT:-9092}
    ports:
      - "${REDPANDA_PORT:-9092}:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--api-urls=redpanda:9644"]
      interval: 10s
      retries: 5
      start_period: 15s

  redpanda-console:
    image: redpandadata/console:v3.7.1
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8081}:8080"
    environment:
      KAFKA_BROKERS: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy

  redpanda-init:
    image: redpandadata/redpanda:v26.1.4
    entrypoint:
      - rpk
      - topic
      - create
      - openaq.measurements
      - --brokers=redpanda:9092
      - --partitions=1
      - --replicas=1
      - -c
      - cleanup.policy=compact
      - -c
      - min.cleanable.dirty.ratio=0.5
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"

  # --- Database ---

  postgres:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
      POSTGRES_DB: ${POSTGRES_DB:-climate}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-climate}"]
      interval: 10s
      retries: 5
      start_period: 10s

  # --- Object storage (S3-compatible) ---

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-climate}
    entrypoint:
      - sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing local/"$$STORAGE_BUCKET"
        echo "Bucket $$STORAGE_BUCKET ready."
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"

  # --- Producer (triggered by Kestra, not auto-started) ---

  worldbank-producer:
    build: ./producer/worldbank
    image: worldbank-producer
    profiles: ["cli"]
    environment:
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://minio:9000}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-climate}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      WORLDBANK_API_BASE_URL: ${WORLDBANK_API_BASE_URL:-https://api.worldbank.org/v2}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
      POSTGRES_DB: ${POSTGRES_DB:-climate}
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy

  openaq-producer:
    build: ./producer/openaq
    image: openaq-producer
    profiles: ["cli"]
    environment:
      OPENAQ_API_BASE_URL: ${OPENAQ_API_BASE_URL:-https://api.openaq.org}
      OPENAQ_API_KEY: ${OPENAQ_API_KEY:-}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      OPENAQ_TOPIC: ${OPENAQ_TOPIC:-openaq.measurements}
      COUNTRIES: ${COUNTRIES:-}
      PARAMETERS: ${PARAMETERS:-pm25,pm10,no2,o3,so2}
    depends_on:
      redpanda:
        condition: service_healthy

  # --- Orchestrator ---

  kestra:
    image: kestra/kestra:v1.3.10
    command: server standalone
    user: "root"
    ports:
      - "${KESTRA_PORT:-8080}:8080"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
      - kestra-data:/app/storage
      - ${DOCKER_SOCKET_DIR:-/var/run}/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/configs >/dev/null"]
      interval: 10s
      retries: 20
      start_period: 30s
    environment:
      KESTRA_CONFIGURATION: |
        kestra:
          repository:
            type: memory
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: memory
          server:
            basic-auth:
              username: ${KESTRA_USER:-admin@kestra.io}
              password: ${KESTRA_PASSWORD:-Admin1234!}
          tutorial-flows:
            enabled: false
    depends_on:
      postgres:
        condition: service_healthy

  kestra-flows-sync:
    image: kestra/kestra:v1.3.10
    entrypoint: ["/bin/sh", "-c"]
    environment:
      KESTRA_USER: ${KESTRA_USER:-admin@kestra.io}
      KESTRA_PASSWORD: ${KESTRA_PASSWORD:-Admin1234!}
    command:
      - |
        /app/kestra flow namespace update climate /opt/kestra/flows \
          --server http://kestra:8080 \
          --user "$${KESTRA_USER}:$${KESTRA_PASSWORD}"
    volumes:
      - ./kestra/flows:/opt/kestra/flows:ro
    depends_on:
      kestra:
        condition: service_healthy
    restart: "no"

  # --- Stream processing ---

  flink-jobmanager:
    build: ./flink
    command: jobmanager
    ports:
      - "${FLINK_PORT:-8082}:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-climate}
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
      dbt-init:
        condition: service_completed_successfully

  flink-taskmanager:
    build: ./flink
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-2}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-climate}
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
    depends_on:
      - flink-jobmanager

  flink-job-submitter:
    build: ./flink
    command: /opt/flink/submit-jobs.sh
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      PG_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-climate}
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
    depends_on:
      - flink-jobmanager
      - flink-taskmanager
    restart: "no"

  # --- Schema (dbt on-run-start creates the raw schema and tables) ---

  dbt-init:
    build: ./dbt
    environment:
      WAREHOUSE_BACKEND: ${WAREHOUSE_BACKEND:-postgres}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-climate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-climate}
      POSTGRES_DB: ${POSTGRES_DB:-climate}
    command: ["run-operation", "create_raw_schema"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

networks:
  default:
    name: climate-net

volumes:
  pgdata:
  kestra-data:
  minio-data:
  redpanda-data:
