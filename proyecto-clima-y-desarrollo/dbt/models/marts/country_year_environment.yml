version: 2

models:
  - name: country_year_environment
    description: "Headline mart joining yearly World Bank development indicators with OpenAQ air-quality aggregations at country_iso3 × year."
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [country_iso3, year]
