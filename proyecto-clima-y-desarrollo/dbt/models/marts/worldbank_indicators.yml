version: 2

models:
  - name: worldbank_indicators
    description: "Long-format World Bank indicators mart. One row per (indicator_code, country_iso3, year)."
    columns:
      - name: indicator_code
        tests: [not_null]
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
      - name: value
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [indicator_code, country_iso3, year]
