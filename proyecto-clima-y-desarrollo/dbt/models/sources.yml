version: 2

sources:
  - name: worldbank
    description: "Raw World Bank Indicators API payloads landed by the worldbank-load CLI."
    schema: raw
    tables:
      - name: worldbank_indicators_raw
        description: "One row per (indicator_code, country_iso3, year). Upserted by the loader."
        columns:
          - name: indicator_code
            tests: [not_null]
          - name: country_iso3
            tests: [not_null]
          - name: year
            tests: [not_null]

  - name: openaq
    description: "OpenAQ measurements landed by Flink (live stream) and Spark (S3 backfill)."
    schema: raw
    tables:
      - name: openaq_measurements
        description: "One row per (location_id, parameter, datetime_utc). Upserted by both pipelines."
        columns:
          - name: location_id
            tests: [not_null]
          - name: parameter
            tests: [not_null]
          - name: datetime_utc
            tests: [not_null]
