version: 2

models:
  - name: int_worldbank__indicators_pivoted
    description: "World Bank indicators pivoted to one row per (country_iso3, year) with friendly column names."
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [country_iso3, year]
