version: 2

models:
  - name: int_openaq__country_year
    description: "OpenAQ measurements aggregated to (country_iso3, year): medians per pollutant + PM2.5 days exceeding the WHO 2021 daily threshold."
    columns:
      - name: country_iso3
        tests: [not_null]
      - name: year
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [country_iso3, year]
